<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — azenspace</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="js/theme.js"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 3rem;
      text-align: center;
      width: 100%;
      max-width: 360px;
    }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .login-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-google:hover { border-color: var(--accent); }
    #error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>azenspace</h1>
      <p>管理員登入</p>
      <button class="btn-google" id="login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        以 Google 登入
      </button>
      <p id="error-msg"></p>
    </div>
  </div>
  <script type="module">
    import { loginWithGoogle } from './js/auth.js';
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, user => {
      if (user) location.href = 'admin.html';
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      try {
        await loginWithGoogle();
      } catch (e) {
        const msg = document.getElementById('error-msg');
        msg.textContent = '登入失敗：' + e.message;
        msg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
